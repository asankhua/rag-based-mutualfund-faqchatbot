name: Daily Data Update Scheduler

on:
  schedule:
    # Run at 10:00 AM UTC daily
    - cron: '0 10 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install beautifulsoup4 lxml playwright apscheduler pytz
        playwright install chromium
        
    - name: Run Phase 6 Scheduler
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        python -m phase6.phase6_scheduler --run-once
        
    - name: Create scheduler metadata
      run: |
        echo "{\"last_run\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > data/scheduler_metadata.json
        
    - name: Check for changes
      id: check_changes
      run: |
        if [ -n "$(git status --porcelain data/)" ]; then
          echo "changes=true" >> $GITHUB_OUTPUT
        else
          echo "changes=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Commit and push changes
      if: steps.check_changes.outputs.changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/
        git commit -m "Auto-update: Daily data refresh $(date -u +%Y-%m-%d_%H:%M:%S)"
        git push
